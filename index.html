<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKEB7T | ZİRVE</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Parlama Efekti Verilen Ana Başlık */
        .shine-text {
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 10px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #660000;
            animation: shine 2s infinite alternate;
            margin-bottom: 10px;
        }

        .sub-text {
            font-size: 1.5rem;
            margin-bottom: 40px;
            letter-spacing: 5px;
            opacity: 0.8;
        }

        @keyframes shine {
            from { text-shadow: 0 0 10px #ff0000; opacity: 0.8; }
            to { text-shadow: 0 0 30px #ff0000, 0 0 50px #ff0000; opacity: 1; }
        }

        /* Giriş Butonu */
        #open-btn {
            padding: 15px 40px;
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 0 10px #ff0000;
        }

        #open-btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 30px #ff0000;
        }

        /* Sosyal Medya Kutusu (Başlangıçta Gizli) */
        #link-container {
            display: none;
            margin-top: 30px;
            border: 1px solid #ff0000;
            padding: 20px;
            background: rgba(20, 0, 0, 0.9);
            box-shadow: 0 0 20px #330000;
            text-align: center;
            width: 250px;
        }

        .social-link {
            display: block;
            color: #ff0000;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-bottom: 1px dashed #440000;
            transition: 0.3s;
        }

        .social-link:hover {
            background: #ff0000;
            color: #000;
        }

        .arabic-text {
            margin-top: 50px;
            font-size: 2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="shine-text">ANKEB7T</div>
    <div class="sub-text">ZİRVE</div>

    <button id="open-btn" onclick="showLinks()">SİTEYE GİRİŞ</button>

    <div id="link-container">
        <a href="https://t.me/allesfurdie" class="social-link" target="_blank">TELEGRAM</a>
        <a href="https://instagram.com/hissedilme" class="social-link" target="_blank">INSTAGRAM</a>
        <a href="https://wa.me/998998780248" class="social-link" target="_blank">WHATSAPP</a>
    </div>

    <div class="arabic-text">لا غالب إلا الله</div>

    <script>
        function showLinks() {
            var btn = document.getElementById('open-btn');
            var container = document.getElementById('link-container');
            
            btn.style.display = 'none'; // Butonu gizle
            container.style.display = 'block'; // Kutuyu göster
        }
    </script>

</body>
</html>
