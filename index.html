<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKXBT7 UC SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c896;
            --bg-light: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1a1d23;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* Modern Navigasyon */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* Hero Bölümü - Daha Aydınlık */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: white;
            padding-top: 80px;
        }

        header h1 {
            font-size: 50px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 18px;
            margin-top: 10px;
        }

        /* Paketler */
        section {
            padding: 60px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            font-weight: 800;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Görsel Alanı (Emoji Kullanımı ile Garanti Çözüm) */
        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        .card h3 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .price {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
        }

        .buy-btn {
            display: block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .buy-btn:hover {
            filter: brightness(0.9);
            transform: scale(1.02);
        }

        footer {
            margin-top: 100px;
            padding: 40px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 36px; }
            .products { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#home">Ana Sayfa</a>
    <a href="#uc">Paketler</a>
    <a href="https://wa.me/905000000000">Destek</a>
</nav>

<header id="home">
    <h1>ANKXBT7 SHOP</h1>
    <p>Hızlı teslimat, güvenli ödeme ve en iyi fiyatlar.</p>
</header>

<section id="uc">
    <h2 class="section-title">UC Paketleri</h2>

    <div class="products">
        <div class="card">
            <span class="card-icon">🪙</span>
            <h3>60 UC</h3>
            <p class="price">25₺</p>
            <a href="https://wa.me/905000000000" class="buy-btn">Satın Al</a>
        </div>

        <div class="card">
            <span class="card-icon">💰</span>
            <h3>325 UC</h3>
            <p class="price">120₺</p>
            <a href="https://wa.me/905000000000" class="buy-btn">Satın Al</a>
        </div>

        <div class="card">
            <span class="card-icon">💎</span>
            <h3>660 UC</h3>
            <p class="price">230₺</p>
            <a href="https://wa.me/905000000000" class="buy-btn">Satın Al</a>
        </div>

        <div class="card">
            <span class="card-icon">👑</span>
            <h3>1800 UC</h3>
            <p class="price">520₺</p>
            <a href="https://wa.me/905000000000" class="buy-btn">Satın Al</a>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 ANKXBT7 UC SHOP. Güvenli alışverişin adresi.</p>
</footer>

</body>
</html>
